name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        run: |
          # Extract changelog for current version
          awk '/^\#\s*\[v[0-9]+\.[0-9]+\.[0-9]+\]/ {if (found) exit; if ($0 ~ /\['${{ steps.version.outputs.version }}'\]/) found=1; next} found' CHANGELOG.md > changelog.txt
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }} - Beveiligings Release
          body: |
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
